name: battlebet
description: "BattleBet — Fitness-Wett-App. MVP-Durchstich: Bets-Liste."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10 # rendert die SVG-Icons (Jogger, Renner ...)
  http: ^1.2.0 # HTTP-Client zum BattleBet-Server
  shared_preferences: ^2.2.0 # merkt das Token fuer "dieses Geraet merken"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: DSEG7 # Sieben-Segment-Digitalschrift fuer Countdowns
      fonts:
        - asset: assets/fonts/DSEG7Classic-BoldItalic.ttf
