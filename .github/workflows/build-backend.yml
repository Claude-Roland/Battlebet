name: build-backend

on:
  push:
    branches: [ main ]
    paths: [ 'server/**' ]
  workflow_dispatch:

concurrency:
  group: build-backend
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: dart_frog build
        working-directory: server
        run: |
          dart pub global activate dart_frog_cli
          dart pub get
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          dart_frog build

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: server/build
          file: server/build/Dockerfile
          push: true
          tags: |
            ghcr.io/claude-roland/battlebet-backend:latest
            ghcr.io/claude-roland/battlebet-backend:${{ github.sha }}
